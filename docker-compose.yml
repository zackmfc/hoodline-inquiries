services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hoodline_app
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      APP_SESSION_SECRET: change-this-session-secret
      CMS_BASE_URL: https://hoodline.impress3.com
      DATABASE_URL: postgresql://hoodline:hoodline@postgres:5432/hoodline
      DEFAULT_SUPERUSER_USERNAME: zack@impress3.com
      DEFAULT_SUPERUSER_PASSWORD: billGAtes1!1
      GMAIL_DELEGATED_USER: ""
      GMAIL_DEFAULT_QUERY: label:auto/correction-candidate is:unread
      GMAIL_SERVICE_ACCOUNT_FILE: ""
      GMAIL_SERVICE_ACCOUNT_JSON: ""
      CLASSIFIER_BACKEND: auto
      CLASSIFIER_MODEL: claude-3-5-sonnet-latest
      CLASSIFIER_TIMEOUT_SECONDS: "45"
      ANTHROPIC_API_KEY: ""
      ANTHROPIC_BASE_URL: https://api.anthropic.com
      RESOLVER_MIN_SIMILARITY: "0.65"
      RESOLVER_MAX_CANDIDATES: "250"
      FETCHER_TIMEOUT_SECONDS: "30"
      FETCHER_USER_AGENT: HoodlineCorrectionsBot/1.0 (+https://hoodline.com)
      CMS_FETCHER_SESSION_COOKIE: ""
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: hoodline_postgres
    environment:
      POSTGRES_USER: hoodline
      POSTGRES_PASSWORD: hoodline
      POSTGRES_DB: hoodline
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoodline -d hoodline"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
