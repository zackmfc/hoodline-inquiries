<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Hoodline Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-shape bg-a"></div>
  <div class="bg-shape bg-b"></div>

  <header class="site-header">
    <div class="brand">
      <p class="kicker">Hoodline Inquiries</p>
      <a href="/" class="brand-link">Correction Ops Dashboard</a>
    </div>
    <nav class="top-nav">
      <a href="/">Home</a>
      <a href="/schedule">Dev Schedule</a>
      <a href="/pipeline">Pipeline Tester</a>
      <a href="{{ cms_base_url }}" target="_blank" rel="noreferrer">Hoodline CMS</a>
      {% if is_admin %}
      <a href="/logout">Logout</a>
      {% else %}
      <a href="/login?next=/pipeline">Admin Login</a>
      {% endif %}
    </nav>
  </header>

  <main class="layout">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
