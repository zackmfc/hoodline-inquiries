<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hoodline Build Dashboard</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Hoodline Correction Automation</p>
        <h1>Development Schedule Dashboard</h1>
      </div>
      <div class="clock-card">
        <p>Current Time</p>
        <strong id="current-time">--</strong>
      </div>
    </header>

    <section class="summary-grid">
      <article class="summary-card">
        <h2>Progress</h2>
        <p><span id="done-count">0</span> / <span id="task-count">0</span> complete</p>
        <div class="meter">
          <div class="meter-fill" id="meter-fill"></div>
        </div>
      </article>

      <article class="summary-card">
        <h2>Remaining Work</h2>
        <p><span id="remaining-hours">0</span> estimated hours left</p>
        <label for="hours-per-day">Build hours/day</label>
        <input id="hours-per-day" type="number" min="1" max="24" step="1" value="6" />
      </article>

      <article class="summary-card">
        <h2>Projected Completion</h2>
        <p id="projected-finish">--</p>
        <p class="muted" id="timeline-health">--</p>
      </article>
    </section>

    <section class="board">
      <div class="board-head">
        <h2>Schedule</h2>
        <button id="reset-btn" type="button">Reset Checkboxes</button>
      </div>
      <ul id="task-list" class="task-list"></ul>
    </section>
  </main>

  <template id="task-template">
    <li class="task-row">
      <label class="task-main">
        <input type="checkbox" class="task-check" />
        <span class="task-title"></span>
      </label>
      <div class="task-meta">
        <span class="task-dates"></span>
        <span class="task-hours"></span>
        <span class="task-status"></span>
      </div>
    </li>
  </template>

  <script src="./app.js"></script>
</body>
</html>
